<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presidio JS — PII Scanner (Standalone)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --ink: #0a0a0a;
    --paper: #f4f1eb;
    --paper-warm: #ebe7df;
    --red: #c0392b;
    --red-soft: #e74c3c22;
    --green: #1a7a4c;
    --green-soft: #1a7a4c18;
    --amber: #b7791f;
    --amber-soft: #b7791f18;
    --blue: #2c5aa0;
    --blue-soft: #2c5aa01a;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Instrument Serif', Georgia, serif;
    --border: 1px solid #0a0a0a22;
    --radius: 3px;
  }

  html { font-size: 16px; height: 100%; }

  body {
    font-family: var(--mono);
    background: var(--paper);
    color: var(--ink);
    height: 100%;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    display: flex; flex-direction: column; height: 100vh; padding: 0.75rem 1rem 0;
  }

  header {
    margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--ink);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .logo { font-family: var(--serif); font-size: 1.8rem; line-height: 1; letter-spacing: -0.02em; }
  .logo em { font-style: italic; color: var(--red); }
  .tagline { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: #0a0a0a88; }

  .mode-bar {
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;
    padding: 0.5rem 0.75rem; background: var(--paper-warm); border: var(--border); border-radius: var(--radius);
    flex-wrap: wrap; flex-shrink: 0;
  }
  .mode-bar .mode-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #0a0a0a77; margin-right: 0.5rem; }

  .mode-btn {
    font-family: var(--mono); font-size: 0.8rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 0.4rem 0.9rem; border: 1px solid #0a0a0a33;
    border-radius: var(--radius); background: white; color: var(--ink); cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--ink); }
  .mode-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .mode-note { font-size: 0.75rem; color: #0a0a0a66; margin-left: auto; font-style: italic; }

  .toolbar {
    display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; flex-wrap: wrap; flex-shrink: 0;
  }

  .scan-btn {
    display: inline-flex; align-items: center; gap: 0.6rem; padding: 0.75rem 1.8rem;
    font-family: var(--mono); font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; background: var(--ink); color: var(--paper); border: none;
    border-radius: var(--radius); cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .scan-btn:hover { background: #222; transform: translateY(-1px); }
  .scan-btn:active { transform: translateY(0); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .three-col {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;
    flex: 1; min-height: 0; margin-bottom: 0.5rem;
  }
  @media (max-width: 1000px) { .three-col { grid-template-columns: 1fr; } }

  .three-col .panel { display: flex; flex-direction: column; min-height: 0; }
  .three-col .panel-body { flex: 1; overflow-y: auto; min-height: 0; }

  .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.14em; color: #0a0a0a77; margin-bottom: 0.5rem; display: block; }

  textarea {
    width: 100%; flex: 1; min-height: 0; height: 100%;
    padding: 1rem; font-family: var(--mono); font-size: 0.9rem;
    line-height: 1.7; border: none; border-radius: 0; background: white;
    color: var(--ink); resize: none; outline: none;
  }
  .highlighted-view {
    padding: 1rem; font-family: var(--mono); font-size: 0.9rem;
    line-height: 1.7; white-space: pre-wrap; word-break: break-word;
    min-height: 0; flex: 1; overflow-y: auto; cursor: default;
  }
  .highlighted-view .pii-hl {
    position: relative; border-bottom: 2px solid var(--red); background: var(--red-soft);
    padding: 0 1px; border-radius: 2px; cursor: default;
  }
  .highlighted-view .pii-hl::after {
    content: attr(data-type); position: absolute; bottom: calc(100% + 2px); left: 0;
    font-size: 0.65rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em;
    background: var(--ink); color: var(--paper); padding: 0.15rem 0.4rem; border-radius: 2px;
    white-space: nowrap; opacity: 0; transform: translateY(4px); transition: all 0.12s;
    pointer-events: none; z-index: 10;
  }
  .highlighted-view .pii-hl:hover::after, .highlighted-view .pii-hl.hover::after { opacity: 1; transform: translateY(0); }
  .highlighted-view .pii-hl:hover, .highlighted-view .pii-hl.hover { filter: brightness(0.88); }
  .highlighted-view .pii-hl[data-type="EMAIL_ADDRESS"] { background: var(--blue-soft); border-bottom-color: var(--blue); }
  .highlighted-view .pii-hl[data-type="PHONE_NUMBER"] { background: var(--green-soft); border-bottom-color: var(--green); }
  .highlighted-view .pii-hl[data-type="PERSON"] { background: var(--red-soft); border-bottom-color: var(--red); }
  .highlighted-view .pii-hl[data-type="LOCATION"] { background: var(--green-soft); border-bottom-color: var(--green); }
  .highlighted-view .pii-hl[data-type="ORGANIZATION"] { background: var(--blue-soft); border-bottom-color: var(--blue); }
  .highlighted-view .pii-hl[data-type="CREDIT_CARD"] { background: var(--amber-soft); border-bottom-color: var(--amber); }
  .highlighted-view .pii-hl[data-type="IBAN_CODE"] { background: var(--amber-soft); border-bottom-color: var(--amber); }
  .highlighted-view .pii-hl[data-type="PASSPORT"] { background: var(--amber-soft); border-bottom-color: var(--amber); }
  .highlighted-view .pii-hl[data-type="NATIONAL_ID"] { background: var(--amber-soft); border-bottom-color: var(--amber); }
  .highlighted-view .pii-hl[data-type="IP_ADDRESS"] { background: #6c3d8f18; border-bottom-color: #6c3d8f; }
  .highlighted-view .pii-hl[data-type="NATIONALITY"] { background: #6c3d8f18; border-bottom-color: #6c3d8f; }
  .highlighted-view .pii-hl[data-type="URL"] { background: var(--blue-soft); border-bottom-color: var(--blue); }
  .highlighted-view .pii-hl[data-type="US_SSN"] { background: var(--red-soft); border-bottom-color: var(--red); }
  .highlighted-view .pii-hl[data-type="CRYPTO"] { background: var(--amber-soft); border-bottom-color: var(--amber); }
  .highlighted-view .pii-hl[data-type="CH_AHV"] { background: var(--red-soft); border-bottom-color: var(--red); }
  .highlighted-view .pii-hl[data-type="CH_UID"] { background: var(--blue-soft); border-bottom-color: var(--blue); }
  .highlighted-view .pii-hl[data-type="OTHER"] { background: #0a0a0a12; border-bottom-color: #555; }

  .edit-btn {
    position: absolute; top: 0.4rem; right: 0.4rem; z-index: 5;
    font-family: var(--mono); font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 0.3rem 0.7rem; background: var(--paper-warm);
    border: var(--border); border-radius: var(--radius); cursor: pointer; opacity: 0.7;
    transition: opacity 0.15s;
  }
  .edit-btn:hover { opacity: 1; }

  .copy-btn {
    margin-left: auto; font-family: var(--mono); font-size: 0.72rem; font-weight: 500;
    padding: 0.25rem 0.7rem; background: transparent; border: 1px solid #0a0a0a33;
    border-radius: var(--radius); cursor: pointer; transition: all 0.15s; color: var(--ink);
  }
  .copy-btn:hover { background: var(--ink); color: var(--paper); }

  .deanon-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: var(--mono); font-size: 0.82rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 0.4rem 0.9rem; border: 1px solid #0a0a0a33;
    border-radius: var(--radius); background: white; color: var(--ink); cursor: pointer;
    transition: all 0.15s; flex-shrink: 0;
  }
  .deanon-btn:hover { border-color: var(--ink); }
  .deanon-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .back-btn {
    display: none; align-items: center; gap: 0.3rem;
    font-family: var(--mono); font-size: 0.82rem; font-weight: 500;
    padding: 0.4rem 0.9rem; border: 1px solid #0a0a0a33;
    border-radius: var(--radius); background: white; color: var(--ink); cursor: pointer;
    transition: all 0.15s; flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--ink); }
  .back-btn svg { width: 14px; height: 14px; }

  .deanon-output { font-size: 0.9rem; line-height: 1.8; word-break: break-word; white-space: pre-wrap; }
  .deanon-output .restored { background: var(--green-soft); border-bottom: 2px solid var(--green); padding: 0 2px; border-radius: 2px; }

  .entity-item.hover { background: var(--paper-warm); }
  textarea.has-highlights { color: var(--ink); }

  /* Selection popup */
  .select-popup {
    display: none; position: fixed; z-index: 500;
    background: var(--ink); color: var(--paper); border-radius: var(--radius);
    padding: 0.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    animation: popIn 0.12s ease;
  }
  .select-popup.open { display: flex; flex-wrap: wrap; gap: 0.35rem; max-width: 460px; }
  @keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: none; } }
  .select-popup::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: var(--ink);
  }
  .popup-type-btn {
    font-family: var(--mono); font-size: 0.82rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.04em; padding: 0.4rem 0.75rem; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 3px; background: transparent; color: var(--paper); cursor: pointer;
    transition: background 0.1s; white-space: nowrap;
  }
  .popup-type-btn:hover { background: rgba(255,255,255,0.15); }
  .popup-label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5;
    padding: 0.3rem 0.5rem; width: 100%;
  }

  .results-wrapper { display: none; flex-shrink: 0; }
  .results-wrapper.visible { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .panel { border: var(--border); border-radius: var(--radius); background: white; overflow: hidden; min-height: 0; }
  .panel-header {
    padding: 0.65rem 1rem; background: var(--paper-warm); border-bottom: var(--border);
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; color: #0a0a0a88;
    display: flex; justify-content: space-between; align-items: center;
  }
  .count-badge { background: var(--ink); color: var(--paper); padding: 0.15rem 0.55rem; border-radius: 2px; font-size: 0.72rem; font-weight: 600; }
  .panel-body { padding: 1rem; overflow-y: auto; }


  .entity-list { list-style: none; }
  .entity-item {
    display: grid; grid-template-columns: auto auto 1fr auto; gap: 0.75rem; align-items: center;
    padding: 0.7rem 0; border-bottom: 1px solid #0a0a0a0a; font-size: 0.95rem; animation: slideIn 0.25s ease;
  }
  .entity-check {
    width: 18px; height: 18px; accent-color: var(--ink); cursor: pointer; margin: 0;
  }
  .entity-item.excluded { opacity: 0.4; }
  .entity-item.excluded .entity-text { text-decoration: line-through; }
  .entity-count {
    font-size: 0.75rem; font-weight: 600; background: var(--ink); color: var(--paper);
    border-radius: 50%; min-width: 1.3rem; height: 1.3rem; display: inline-flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .entity-item:last-child { border-bottom: none; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

  .entity-tag {
    font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.25rem 0.6rem; border-radius: 3px; white-space: nowrap; background: #0a0a0a0d; color: #555;
  }
  .entity-tag[data-type="EMAIL_ADDRESS"] { background: var(--blue-soft); color: var(--blue); }
  .entity-tag[data-type="US_SSN"] { background: var(--red-soft); color: var(--red); }
  .entity-tag[data-type="PHONE_NUMBER"] { background: var(--green-soft); color: var(--green); }
  .entity-tag[data-type="CREDIT_CARD"] { background: var(--amber-soft); color: var(--amber); }
  .entity-tag[data-type="IP_ADDRESS"] { background: #6c3d8f18; color: #6c3d8f; }
  .entity-tag[data-type="PERSON"] { background: var(--red-soft); color: var(--red); }
  .entity-tag[data-type="LOCATION"] { background: var(--green-soft); color: var(--green); }
  .entity-tag[data-type="ORGANIZATION"] { background: var(--blue-soft); color: var(--blue); }
  .entity-tag[data-type="PASSPORT"] { background: var(--amber-soft); color: var(--amber); }
  .entity-tag[data-type="NATIONAL_ID"] { background: var(--amber-soft); color: var(--amber); }
  .entity-tag[data-type="NATIONALITY"] { background: #6c3d8f18; color: #6c3d8f; }
  .entity-tag[data-type="CH_AHV"] { background: var(--red-soft); color: var(--red); }
  .entity-tag[data-type="CH_UID"] { background: var(--blue-soft); color: var(--blue); }
  .entity-tag[data-type="OTHER"] { background: #0a0a0a0d; color: #555; }

  .entity-text { font-family: var(--mono); font-size: 0.92rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entity-score-wrap {
    display: flex; align-items: center; gap: 0.4rem; min-width: 5.5rem; justify-content: flex-end;
  }
  .entity-score-bar {
    width: 2.5rem; height: 5px; background: #0a0a0a0d; border-radius: 3px; overflow: hidden;
  }
  .entity-score-fill {
    height: 100%; border-radius: 3px; transition: width 0.3s ease;
  }
  .entity-score { font-size: 0.68rem; color: #0a0a0a66; font-variant-numeric: tabular-nums; min-width: 2rem; text-align: right; }

  .confidence-slider-wrap {
    display: flex; align-items: center; gap: 1rem; padding: 0.5rem 1rem;
    background: var(--paper-warm); border: var(--border); border-radius: var(--radius);
    font-size: 0.85rem;
  }
  .confidence-slider-wrap label { white-space: nowrap; font-weight: 500; }
  .confidence-slider-wrap input[type="range"] {
    flex: 1; accent-color: var(--ink); height: 6px; cursor: pointer;
  }
  .confidence-slider-wrap .slider-value {
    font-variant-numeric: tabular-nums; min-width: 2.5rem; text-align: right; font-weight: 600;
  }

  .anon-output { font-size: 0.9rem; line-height: 1.8; word-break: break-word; white-space: pre-wrap; }
  .redacted { background: var(--ink); color: var(--paper); padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.04em; cursor: default; transition: background 0.15s; }
  .redacted[data-dk] { cursor: pointer; }
  .redacted[data-dk]:hover { background: var(--accent, #c05); }

  .stats-bar { display: flex; gap: 2rem; padding: 0.4rem 0; border-top: 1px solid var(--ink); font-size: 0.68rem; }
  .stat-item { display: flex; align-items: baseline; gap: 0.4rem; }
  .stat-value { font-weight: 600; font-size: 1.1rem; font-family: var(--serif); }
  .stat-label { text-transform: uppercase; letter-spacing: 0.08em; color: #0a0a0a77; font-size: 0.72rem; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--paper); border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: #0a0a0a22; border-radius: 2px; }

  /* Settings button */
  .settings-btn {
    display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 0.9rem;
    font-family: var(--mono); font-size: 0.72rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; background: white; color: var(--ink); border: var(--border);
    border-radius: var(--radius); cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .settings-btn:hover { border-color: var(--ink); }
  .settings-btn svg { width: 14px; height: 14px; }

  /* Modal overlay */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(10,10,10,0.4);
    z-index: 1000; align-items: center; justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  .modal-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--paper); border: 2px solid var(--ink); border-radius: var(--radius);
    width: 520px; max-width: 92vw; max-height: 80vh; display: flex; flex-direction: column;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: none; } }

  .modal-header {
    padding: 1rem 1.25rem; border-bottom: var(--border); display: flex;
    justify-content: space-between; align-items: center;
  }
  .modal-header h2 {
    font-family: var(--serif); font-size: 1.3rem; font-weight: 400;
  }
  .modal-close {
    background: none; border: none; font-size: 1.2rem; cursor: pointer;
    color: var(--ink); opacity: 0.5; transition: opacity 0.15s; padding: 0.25rem;
  }
  .modal-close:hover { opacity: 1; }

  .modal-body {
    padding: 1.25rem; overflow-y: auto; flex: 1;
  }

  .entity-group-title {
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: #0a0a0a66; margin-bottom: 0.5rem; margin-top: 1rem; padding-bottom: 0.3rem;
    border-bottom: 1px solid #0a0a0a0d;
  }
  .entity-group-title:first-child { margin-top: 0; }

  .entity-toggle {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0;
    font-size: 0.8rem; cursor: pointer;
  }
  .entity-toggle input { accent-color: var(--ink); width: 14px; height: 14px; cursor: pointer; }
  .entity-toggle-label { font-weight: 500; }
  .entity-toggle-desc { font-size: 0.68rem; color: #0a0a0a77; margin-left: auto; }

  .modal-footer {
    padding: 0.75rem 1.25rem; border-top: var(--border); display: flex;
    justify-content: space-between; align-items: center;
  }
  .modal-footer-links { display: flex; gap: 1rem; }
  .modal-link {
    font-family: var(--mono); font-size: 0.68rem; color: var(--ink); opacity: 0.5;
    text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0;
  }
  .modal-link:hover { opacity: 1; }
  .modal-done {
    font-family: var(--mono); font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 0.5rem 1.2rem; background: var(--ink); color: var(--paper);
    border: none; border-radius: var(--radius); cursor: pointer; transition: background 0.15s;
  }
  .modal-done:hover { background: #222; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Presidio<em>JS</em></div>
    <div class="tagline">Client-side PII detection &amp; anonymization</div>
  </header>

  <div class="mode-bar">
    <span class="mode-label">Engine</span>
    <button class="mode-btn active" data-mode="ner">NER</button>
    <span class="mode-note" id="modeNote">NER mode — ~67 MB model, detects names/places/orgs</span>
  </div>

  <div class="toolbar">
    <button class="scan-btn" id="scanBtn">Scan for PII →</button>
    <button class="settings-btn" id="settingsBtn">

  var SUFFIXES = ["ing", "ed", "ly", "er", "est", "tion", "sion", "ment", "ness", "s"];
  function simpleStem(word) {

    for (const suffix of SUFFIXES) {

      const recognizerMap = new Map();
      for (const r of recognizers) {
        recognizerMap.set(r.name, r);

        if (!recognizer || recognizer.context.length === 0) return result;

        for (const token of surroundingTokens) {

          if (contextWords.some((cw) => stemmed.includes(cw) || cw.includes(stemmed))) {
            const boosted = Math.min(result.score + this.contextBoost, 1);
            return {

        const distance = Math.min(
          Math.abs(span.start - result.end),
          Math.abs(span.end - result.start)

        if (span.end <= result.start || span.start >= result.end) {
          if (distance <= 50) {
            tokens.push(artifacts.tokens[i]);
          }
        }
      }

  function resolveConflicts(results) {

    const sorted = [...results].sort((a, b) => a.start - b.start || b.end - a.end);
    const resolved = [];
    for (const current of sorted) {
      const last = resolved[resolved.length - 1];
      if (!last || current.start >= last.end) {
        resolved.push(current);
      } else {
        if (current.score > last.score) {
          resolved[resolved.length - 1] = current;
        } else if (current.score === last.score && current.entityType === last.entityType) {

        cb.addEventListener('change', () => {
          if (cb.checked) {
            excludedSet.delete(g.dk);
          } else {
            excludedSet.add(g.dk);
          }
          rerender();
        });

        const tag = document.createElement('span');
        tag.className = 'entity-tag';
        tag.dataset.type = rep.entityType;
        tag.textContent = rep.entityType;

        const txt = document.createElement('span');
        txt.className = 'entity-text';
        txt.textContent = text.slice(rep.start, rep.end);

        const scoreWrap = document.createElement('span');
        scoreWrap.className = 'entity-score-wrap';

        if (g.items.length > 1) {
          const countBadge = document.createElement('span');
          countBadge.className = 'entity-count';
          countBadge.textContent = String(g.items.length);
          countBadge.title = g.items.length + ' occurrences';
          scoreWrap.appendChild(countBadge);
        }

        const bar = document.createElement('span');
        bar.className = 'entity-score-bar';
        const fill = document.createElement('span');
        fill.className = 'entity-score-fill';
        fill.style.width = (g.bestScore * 100).toFixed(0) + '%';
        fill.style.background = scoreColor(g.bestScore);
        bar.appendChild(fill);

        const scoreLbl = document.createElement('span');
        scoreLbl.className = 'entity-score';
        scoreLbl.textContent = (g.bestScore * 100).toFixed(0) + '%';

        scoreWrap.append(bar, scoreLbl);
        li.append(cb, tag, txt, scoreWrap);
        list.appendChild(li);
      });
    }

    const active = aboveThreshold.filter(r => !excludedSet.has(displayKey(r, text)));
    document.getElementById('entityCount').textContent = String(active.length);

    showHighlightedView(text, active);

    const anonEl = document.getElementById('anonOutput');
    anonEl.replaceChildren();

    const idCounters = {};
    const textToId = {};
    const idMapping = {};
    const ascending = [...active].sort((a, b) => a.start - b.start);
    for (const r of ascending) {
      const key = r.entityType + '::' + text.slice(r.start, r.end);
      if (!textToId[key]) {
        const n = (idCounters[r.entityType] = (idCounters[r.entityType] || 0) + 1);
        const tag = r.entityType + '_' + n;
        textToId[key] = tag;
        idMapping[tag] = text.slice(r.start, r.end);
      }
      r._anonTag = textToId[key];
    }

    window.__piiMapping = idMapping;

    let anonText = text;
    const descending = [...active].sort((a, b) => b.start - a.start);
    for (const r of descending) {
      anonText = anonText.slice(0, r.start) + '<' + r._anonTag + '>' + anonText.slice(r.end);
    }

    const tagToDk = {};
    for (const r of active) {
      tagToDk[r._anonTag] = displayKey(r, text);
    }

    const tagPattern = /<(\w+_\d+)>/g;
    let anonCursor = 0;
    let m;
    while ((m = tagPattern.exec(anonText)) !== null) {
      if (m.index > anonCursor) anonEl.appendChild(document.createTextNode(anonText.slice(anonCursor, m.index)));
      const badge = document.createElement('span');
      badge.className = 'redacted';
      badge.textContent = m[0];
      const dk = tagToDk[m[1]];
      if (dk) {
        badge.dataset.dk = dk;
        badge.addEventListener('mouseenter', () => {
          document.querySelectorAll('.entity-item[data-dk="' + CSS.escape(dk) + '"]')
            .forEach(el => el.classList.add('hover'));
          document.querySelectorAll('.pii-hl[data-dk="' + CSS.escape(dk) + '"]')
            .forEach(el => el.classList.add('hover'));
        });
        badge.addEventListener('mouseleave', () => {
          document.querySelectorAll('.entity-item.hover').forEach(el => el.classList.remove('hover'));
          document.querySelectorAll('.pii-hl.hover').forEach(el => el.classList.remove('hover'));
        });
      }
      anonEl.appendChild(badge);
      anonCursor = m.index + m[0].length;
    }
    if (anonCursor < anonText.length) anonEl.appendChild(document.createTextNode(anonText.slice(anonCursor)));


    document.getElementById('statEntities').textContent = String(active.length);
    document.getElementById('statTypes').textContent = String(new Set(active.map(r => r.entityType)).size);
    document.getElementById('statTime').textContent = String(elapsed);
  }

  document.getElementById('copyAnon').addEventListener('click', () => {
    const anonEl = document.getElementById('anonOutput');
    const text = anonEl.textContent || '';
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyAnon');
      const orig = btn.textContent;
      btn.textContent = '✓ Copied';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  });

  scanBtn.addEventListener('click', async () => {
    const text = document.getElementById('inputText').value;
    if (!text.trim()) return;

    scanBtn.disabled = true;
    scanBtn.replaceChildren();
    const spinner = document.createElement('span');
    spinner.className = 'spinner';
    scanBtn.append(spinner, document.createTextNode(' Scanning…'));

    const t0 = performance.now();

    try {
      // NER analyzer (lazy init)
      if (!nerAnalyzer) {
        const nlpEngine = new TransformersNlpEngine({ quantized: true });
        nerAnalyzer = new AnalyzerEngine({ nlpEngine });
      }

      const entities = enabledEntities.size > 0 ? [...enabledEntities] : undefined;
      const results = await nerAnalyzer.analyze(text, { entities });

      // Also run regex-only pass and merge non-overlapping findings (unchecked)
      let regexExtras = [];
      const regexResults = await regexAnalyzer.analyze(text, { entities });
      for (const rr of regexResults) {
        const overlaps = results.some(nr =>
          nr.start < rr.end && rr.start < nr.end
        );
        if (!overlaps) {
          regexExtras.push(rr);
        }
      }

      const allResults = [...results, ...regexExtras];
      const anon = await anonymizer.anonymize(text, results);
      const elapsed = Math.round(performance.now() - t0);
      lastText = text;
      lastResults = allResults;
      lastAnon = anon;
      lastElapsed = elapsed;
      excludedSet.clear();
      for (const rr of regexExtras) {
        excludedSet.add(displayKey(rr, text));
      }
      renderResults(text, allResults, anon, elapsed, confidenceSlider.value / 100);
    } catch (err) {
      console.error(err);
      const msg = err instanceof Error ? err.message : String(err);
      alert('Error: ' + msg);
    } finally {
      scanBtn.disabled = false;
      scanBtn.replaceChildren(document.createTextNode('Scan for PII →'));
    }
  });

  confidenceSlider.addEventListener('input', () => {
    confidenceValue.textContent = confidenceSlider.value + '%';
    rerender();
  });

  const inputText = document.getElementById('inputText');
  const inputPanelBody = document.getElementById('inputPanelBody');

  function showHighlightedView(text, active) {
    const existing = document.getElementById('highlightedView');
    if (existing) existing.remove();
    const oldBtn = inputPanelBody.querySelector('.edit-btn');
    if (oldBtn) oldBtn.remove();

    const div = document.createElement('div');
    div.className = 'highlighted-view';
    div.id = 'highlightedView';

    let cursor = 0;
    const sorted = [...active].sort((a, b) => a.start - b.start);
    for (const r of sorted) {
      if (r.start > cursor) div.appendChild(document.createTextNode(text.slice(cursor, r.start)));
      const span = document.createElement('span');
      span.className = 'pii-hl';
      span.dataset.type = r.entityType;
      span.dataset.dk = displayKey(r, text);
      span.textContent = text.slice(r.start, r.end);
      span.addEventListener('mouseenter', () => {
        document.querySelectorAll('.entity-item[data-dk="' + CSS.escape(span.dataset.dk) + '"]')
          .forEach(el => el.classList.add('hover'));
      });
      span.addEventListener('mouseleave', () => {
        document.querySelectorAll('.entity-item.hover').forEach(el => el.classList.remove('hover'));
      });
      div.appendChild(span);
      cursor = r.end;
    }
    if (cursor < text.length) div.appendChild(document.createTextNode(text.slice(cursor)));

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.textContent = 'Edit';
    editBtn.addEventListener('click', switchToEdit);

    inputText.style.display = 'none';
    inputPanelBody.appendChild(div);
    inputPanelBody.appendChild(editBtn);
  }

  function switchToEdit() {
    const hlView = document.getElementById('highlightedView');
    if (hlView) hlView.remove();
    const editBtn = inputPanelBody.querySelector('.edit-btn');
    if (editBtn) editBtn.remove();
    inputText.style.display = '';
    inputText.focus();
    lastResults = [];
    lastText = '';
    excludedSet.clear();
    document.getElementById('resultsWrapper').classList.remove('visible');
    document.getElementById('entityList').replaceChildren(
      Object.assign(document.createElement('li'), { className: 'empty-state', textContent: 'Run a scan to detect PII' })
    );
    document.getElementById('entityCount').textContent = '0';
    document.getElementById('anonOutput').replaceChildren();
  }

  // Selection popup for manual entity tagging
  const selectPopup = document.getElementById('selectPopup');
  const POPUP_TYPES = [
    'PERSON', 'ORGANIZATION', 'LOCATION', 'DATE_TIME',
    'PHONE_NUMBER', 'EMAIL_ADDRESS', 'IBAN_CODE', 'CREDIT_CARD',
    'PASSPORT', 'NATIONAL_ID', 'NATIONALITY', 'IP_ADDRESS', 'URL',
    'CH_AHV', 'CH_UID', 'OTHER',
  ];

  let pendingSelection = null;

  function hidePopup() {
    selectPopup.classList.remove('open');
    pendingSelection = null;
  }

  function showPopup(rect) {
    selectPopup.replaceChildren();
    const label = document.createElement('span');
    label.className = 'popup-label';
    label.textContent = 'Tag as entity:';
    selectPopup.appendChild(label);

    for (const type of POPUP_TYPES) {
      if (!enabledEntities.has(type)) continue;
      const btn = document.createElement('button');
      btn.className = 'popup-type-btn';
      btn.textContent = type;
      btn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if (!pendingSelection) return;
        addManualEntity(pendingSelection.text, pendingSelection.start, pendingSelection.end, type);
        hidePopup();
      });
      selectPopup.appendChild(btn);
    }

    const popupW = 340;
    let left = rect.left + rect.width / 2 - popupW / 2;
    left = Math.max(8, Math.min(left, window.innerWidth - popupW - 8));
    selectPopup.style.left = left + 'px';
    selectPopup.style.top = (rect.top - 8) + 'px';
    selectPopup.style.transform = 'translateY(-100%)';
    selectPopup.classList.add('open');
  }

  function addManualEntity(selectedText, start, end, entityType) {
    const manualResult = { entityType, start, end, score: 1.0, recognizerName: 'Manual' };
    lastResults.push(manualResult);
    if (!lastText) lastText = inputText.value;
    rerender();
    document.getElementById('resultsWrapper').classList.add('visible');
  }

  inputPanelBody.addEventListener('mouseup', () => {
    const hlView = document.getElementById('highlightedView');
    if (!hlView) return;

    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) { hidePopup(); return; }

    const selectedText = sel.toString();
    if (!selectedText.trim()) { hidePopup(); return; }

    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();

    function getOffset(container, node, offset) {
      let chars = 0;
      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
      while (walker.nextNode()) {
        if (walker.currentNode === node) return chars + offset;
        chars += walker.currentNode.length;
      }
      return chars;
    }
    const start = getOffset(hlView, range.startContainer, range.startOffset);
    const end = getOffset(hlView, range.endContainer, range.endOffset);
    if (start === end) { hidePopup(); return; }

    pendingSelection = { text: lastText.slice(start, end), start, end };
    showPopup(rect);
  });

  document.addEventListener('mousedown', (e) => {
    if (!selectPopup.contains(e.target) && !inputPanelBody.contains(e.target)) {
      hidePopup();
    }
  });

  window.addEventListener('scroll', hidePopup, true);
  window.addEventListener('resize', hidePopup);

  // ── Deanonymize mode ──
  const deanonBtn = document.getElementById('deanonBtn');
  const backBtn = document.getElementById('backBtn');
  let savedScanState = null;

  deanonBtn.addEventListener('click', () => {
    if (!window.__piiMapping || Object.keys(window.__piiMapping).length === 0) {
      alert('Run a scan first to build the entity mapping.');
      return;
    }

    const inputPanel = document.querySelector('.three-col .panel:nth-child(1)');
    const entityPanel = document.querySelector('.three-col .panel:nth-child(2)');
    const anonPanel = document.querySelector('.three-col .panel:nth-child(3)');
    savedScanState = {
      inputBody: inputPanelBody.innerHTML,
      inputDisplay: inputText.style.display,
      entityBody: entityPanel.querySelector('.panel-body').innerHTML,
      entityHeader: entityPanel.querySelector('.panel-header').innerHTML,
      anonBody: anonPanel.querySelector('.panel-body').innerHTML,
    };

    deanonBtn.style.display = 'none';
    backBtn.style.display = 'inline-flex';
    scanBtn.style.display = 'none';
    document.getElementById('settingsBtn').style.display = 'none';
    document.querySelector('.confidence-slider-wrap').style.display = 'none';

    const inputHeader = inputPanel.querySelector('.panel-header');
    inputHeader.textContent = 'Paste LLM Response';
    inputPanelBody.replaceChildren();
    const deanonTextarea = document.createElement('textarea');
    deanonTextarea.id = 'deanonInput';
    deanonTextarea.placeholder = 'Paste text containing <PERSON_1>, <LOCATION_2>, etc.';
    deanonTextarea.style.cssText = 'width:100%;height:100%;padding:1rem;font-family:var(--mono);font-size:0.9rem;line-height:1.7;border:none;resize:none;outline:none;background:white;color:var(--ink);';
    inputPanelBody.appendChild(deanonTextarea);

    entityPanel.querySelector('.panel-header').innerHTML = '<span>Entity Mapping</span>';
    const epBody = entityPanel.querySelector('.panel-body');
    epBody.replaceChildren();
    const mapList = document.createElement('ul');
    mapList.className = 'entity-list';
    mapList.style.fontSize = '0.88rem';
    for (const [id, orig] of Object.entries(window.__piiMapping)) {
      const li = document.createElement('li');
      li.style.cssText = 'padding:0.5rem 0;border-bottom:1px solid #0a0a0a0a;display:flex;gap:0.5rem;align-items:center;';
      const tag = document.createElement('span');
      tag.className = 'redacted';
      tag.style.fontSize = '0.78rem';
      tag.textContent = '<' + id + '>';
      const arrow = document.createTextNode(' → ');
      const val = document.createElement('span');
      val.style.fontWeight = '500';
      val.textContent = orig;
      li.append(tag, arrow, val);
      mapList.appendChild(li);
    }
    epBody.appendChild(mapList);

    anonPanel.querySelector('.panel-header').innerHTML = 'Restored Output <button class="copy-btn" id="copyRestored" title="Copy restored text">📋 Copy</button>';
    document.getElementById('copyRestored').addEventListener('click', () => {
      const t = document.getElementById('deanonOutput')?.textContent || '';
      navigator.clipboard.writeText(t).then(() => {
        const btn = document.getElementById('copyRestored');
        const orig = btn.textContent;
        btn.textContent = '✓ Copied';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    });
    const anonBody = anonPanel.querySelector('.panel-body');
    anonBody.replaceChildren();
    const restoredDiv = document.createElement('div');
    restoredDiv.className = 'deanon-output';
    restoredDiv.id = 'deanonOutput';
    anonBody.appendChild(restoredDiv);

    deanonTextarea.addEventListener('input', () => {
      renderDeanonymized(deanonTextarea.value);
    });
    deanonTextarea.focus();
  });

  function renderDeanonymized(text) {
    const out = document.getElementById('deanonOutput');
    if (!out) return;
    out.replaceChildren();
    if (!text) return;

    const mapping = window.__piiMapping || {};
    const keys = Object.keys(mapping);
    if (keys.length === 0) {
      out.appendChild(document.createTextNode(text));
      return;
    }
    const pattern = new RegExp('<(' + keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')>', 'g');
    let cursor = 0;
    let m;
    while ((m = pattern.exec(text)) !== null) {
      if (m.index > cursor) out.appendChild(document.createTextNode(text.slice(cursor, m.index)));
      const span = document.createElement('span');
      span.className = 'restored';
      span.textContent = mapping[m[1]];
      span.title = '<' + m[1] + '>';
      out.appendChild(span);
      cursor = m.index + m[0].length;
    }
    if (cursor < text.length) out.appendChild(document.createTextNode(text.slice(cursor)));
  }

  backBtn.addEventListener('click', () => {
    if (!savedScanState) return;

    deanonBtn.style.display = '';
    backBtn.style.display = 'none';
    scanBtn.style.display = '';
    document.getElementById('settingsBtn').style.display = '';
    document.querySelector('.confidence-slider-wrap').style.display = '';

    const inputPanel = document.querySelector('.three-col .panel:nth-child(1)');
    const entityPanel = document.querySelector('.three-col .panel:nth-child(2)');
    const anonPanel = document.querySelector('.three-col .panel:nth-child(3)');

    inputPanel.querySelector('.panel-header').textContent = 'Input Text';
    inputPanelBody.innerHTML = savedScanState.inputBody;
    const ta = document.getElementById('inputText');
    if (ta) ta.style.display = savedScanState.inputDisplay;

    entityPanel.querySelector('.panel-header').innerHTML = savedScanState.entityHeader;
    entityPanel.querySelector('.panel-body').innerHTML = savedScanState.entityBody;

    anonPanel.querySelector('.panel-header').innerHTML = 'Anonymized Output\n        <button class="copy-btn" id="copyAnon" title="Copy anonymized text">📋 Copy</button>';
    anonPanel.querySelector('.panel-body').innerHTML = savedScanState.anonBody;

    document.getElementById('copyAnon')?.addEventListener('click', () => {
      const anonEl = document.getElementById('anonOutput');
      const t = anonEl?.textContent || '';
      navigator.clipboard.writeText(t).then(() => {
        const btn = document.getElementById('copyAnon');
        const orig = btn.textContent;
        btn.textContent = '✓ Copied';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    });

    savedScanState = null;
  });
</script>

</body>
</html>
